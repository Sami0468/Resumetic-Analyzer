<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — Resumetic Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
<style>
:root{--primary:#4F46E5;--primary-light:#6366F1;--secondary:#7C3AED;--accent:#06B6D4;--bg:#0F172A;--bg2:#1E293B;--bg3:#334155;--text:#F8FAFC;--text2:#CBD5E1;--text3:#94A3B8;--border:rgba(255,255,255,0.08);--glass:rgba(255,255,255,0.05);--glass-border:rgba(255,255,255,0.12);--success:#10B981;--danger:#EF4444;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;overflow:auto;}
.bg-orbs{position:fixed;inset:0;pointer-events:none;z-index:0;}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.12;}
.orb1{width:500px;height:500px;background:var(--primary);top:-100px;left:-100px;}
.orb2{width:400px;height:400px;background:var(--secondary);bottom:-100px;right:-100px;}
.card{position:relative;z-index:1;background:var(--glass);border:1px solid var(--glass-border);border-radius:24px;padding:48px;width:100%;max-width:440px;backdrop-filter:blur(20px);}
.logo{display:flex;align-items:center;gap:10px;font-size:20px;font-weight:800;color:var(--text);margin-bottom:32px;text-decoration:none;}
.logo-intelli{color:#3B82F6;}
.logo-icon{width:40px;height:40px;background:transparent;border-radius:12px;display:block;object-fit:contain;}
h1{font-size:28px;font-weight:800;margin-bottom:8px;}
.subtitle{font-size:14px;color:var(--text3);margin-bottom:32px;}
.form-group{margin-bottom:20px;}
label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px;}
.input-wrap{position:relative;}
.input-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:15px;}
input{width:100%;padding:14px 16px 14px 44px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;transition:border-color 0.2s;}
input:focus{outline:none;border-color:var(--primary);}
input::placeholder{color:var(--text3);}
.btn-full{width:100%;padding:14px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:#fff;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:8px;}
.btn-full:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(79,70,229,0.4);}
.divider{text-align:center;color:var(--text3);font-size:13px;margin:20px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;} .divider::after{right:0;}
.link-row{text-align:center;font-size:14px;color:var(--text3);}
.link-row a{color:var(--primary-light);font-weight:600;}
.flash{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.flash.error{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#F87171;}
.flash.success{background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#34D399;}
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div></div>
<div class="card">
  <a href="/" class="logo"><img src="{{ url_for('static', filename='images/logo1.svg') }}" alt="Logo" class="logo-icon">Resumetic Analyzer</a>
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to access your analysis history and saved reports.</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="flash {{ cat }}"><i class="fas fa-{{ 'exclamation-circle' if cat == 'error' else 'check-circle' }}"></i>{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <div class="input-wrap">
        <i class="fas fa-envelope"></i>
        <input type="email" name="email" placeholder="you@example.com" required/>
      </div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap">
        <i class="fas fa-lock"></i>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
    </div>
    <button type="submit" class="btn-full"><i class="fas fa-sign-in-alt"></i> Sign In</button>
  </form>
  <div class="divider">or</div>
  <div class="link-row">Don't have an account? <a href="/register">Register free</a></div>
  <div class="link-row" style="margin-top:12px;"><a href="/">← Back to Home</a></div>
</div>
</body>
</html>
